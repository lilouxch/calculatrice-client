<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice d'Épargne</title>
    <style>
        :root {
            --primary-color: #0052CC; /* Bleu InvestGlass-like */
            --bg-color: #f4f7f9;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; /* Pour mieux s'intégrer via iframe */
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .calc-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 { color: var(--primary-color); font-size: 1.2rem; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #666; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #003d99; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef4ff;
            border-radius: 8px;
            text-align: center;
        }
        .result-val {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Simulateur d'Épargne</h2>
    
    <div class="input-group">
        <label>Capital Initial (€)</label>
        <input type="number" id="principal" value="1000">
    </div>
    
    <div class="input-group">
        <label>Versement Mensuel (€)</label>
        <input type="number" id="monthly" value="100">
    </div>
    
    <div class="input-group">
        <label>Taux Annuel (%)</label>
        <input type="number" id="rate" value="3" step="0.1">
    </div>
    
    <div class="input-group">
        <label>Durée (Années)</label>
        <input type="number" id="years" value="10">
    </div>

    <button onclick="calculate()">Calculer</button>

    <div class="result" id="result-box" style="display:none;">
        <span id="label-res">Capital final estimé :</span>
        <span class="result-val" id="total-value">0 €</span>
    </div>
</div>

<script>
    function calculate() {
        const P = parseFloat(document.getElementById('principal').value);
        const PMT = parseFloat(document.getElementById('monthly').value);
        const r = parseFloat(document.getElementById('rate').value) / 100 / 12;
        const n = parseFloat(document.getElementById('years').value) * 12;

        // Formule des intérêts composés avec versements mensuels
        // FV = P(1+r)^n + PMT * [((1+r)^n - 1) / r]
        const futureValue = P * Math.pow(1 + r, n) + PMT * ((Math.pow(1 + r, n) - 1) / r);

        document.getElementById('total-value').innerText = 
            new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(futureValue);
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
